name: Bug report
description: Report a defect
labels: [bug]
body:
  - type: textarea
    id: symptom
    attributes:
      label: Symptom
      description: What happened / what you expected
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
  - type: input
    id: version
    attributes:
      label: Version / OS
      placeholder: "v1.0.0 / Windows 11 23H2 x64"
    validations:
      required: true
  - type: textarea
    id: crash
    attributes:
      label: Crash info (optional)
      description: If it won't start or crashes, the relevant .dmp name/time under `%LOCALAPPDATA%\CrashDumps`, if any

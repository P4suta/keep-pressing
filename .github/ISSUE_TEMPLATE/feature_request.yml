name: Feature request
description: Propose a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What situation is difficult today
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Proposed solution
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives / notes

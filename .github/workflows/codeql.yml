name: CodeQL

# C# requires a real build (WinUI/.NET 10, net*-windows TFM can't restore buildless on Ubuntu), so analyze
# by tracing the build on windows + mise. Run on push to main and weekly only (PRs rely on CI build-test).
on:
  push:
    branches: [main]
  schedule:
    - cron: '24 6 * * 1'

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.runner }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: csharp
            build-mode: manual
            runner: windows-latest
          - language: actions
            build-mode: none
            runner: ubuntu-latest
    steps:
      # harden-runner: audit only. Windows filtering is limited and CodeQL's endpoints vary by version
      # (bundle downloads, etc.), so block is brittle here.
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # C# is analyzed via a real build, so set up the same mise toolchain (.NET 10 / just) as CI.
      - name: Setup toolchain (mise)
        if: matrix.language == 'csharp'
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # build-mode: manual for C#. Trace compilation via the same just build (mise .NET 10) as CI to build a
      # complete C# database.
      - name: Build for CodeQL (C#)
        if: matrix.build-mode == 'manual'
        run: just build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"

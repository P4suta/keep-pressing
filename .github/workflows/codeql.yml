name: CodeQL

# C# は WinUI/.NET10(net*-windows TFM)のため Ubuntu/buildless では restore できず
# 空解析になる。windows + mise(.NET 10) で実ビルドをトレースして正しく解析する。
# 負荷を避けるため main への push と週次のみ実行（PR は CI の build-test に任せる）。
on:
  push:
    branches: [main]
  schedule:
    - cron: '24 6 * * 1'

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.runner }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: csharp
            build-mode: manual
            runner: windows-latest
          - language: actions
            build-mode: none
            runner: ubuntu-latest
    steps:
      # harden-runner は audit(可視化)で統一。Windows はフィルタが限定的で、CodeQL の通信先は
      # バンドル取得など版依存で広いため block は誤検知/破綻しやすい。監査ログで egress を可視化する。
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # C# は実ビルドして解析するため、CI と同一の mise(.NET 10 / just)を用意する。
      - name: Setup toolchain (mise)
        if: matrix.language == 'csharp'
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # build-mode: manual の C#。CI と同じ just build（mise の .NET 10）でコンパイルを
      # トレースさせ、完全な C# データベースを構築する（default setup の空解析を解消）。
      - name: Build for CodeQL (C#)
        if: matrix.build-mode == 'manual'
        run: just build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          category: "/language:${{ matrix.language }}"

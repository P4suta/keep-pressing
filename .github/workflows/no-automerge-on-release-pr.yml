# A Release PR must be merged by a deliberate manual click (ADR-0001). Auto-merge
# is a repo-wide feature that may be relied on for normal PRs, so GitHub's "Enable
# auto-merge" button can't be hidden per-PR — instead, if anyone arms auto-merge on
# a release-please PR, turn it straight back off. Without this, pre-arming auto-merge
# and later adding the `release: approved` label would collapse the deliberate-merge
# gate into a single action.
#
# pull_request_target so this runs from main's definition with a write token; it
# only calls the API to disable auto-merge (never checks out PR code), and the guard
# is scoped to release-please's own branch, so it's safe and never touches normal PRs.
name: no-automerge-on-release-pr

on:
  pull_request_target:
    types: [auto_merge_enabled]

permissions:
  contents: read

jobs:
  disable:
    if: startsWith(github.event.pull_request.head.ref, 'release-please--')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Disable auto-merge on the Release PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr merge "$PR" --repo "$REPO" --disable-auto-merge
          gh pr comment "$PR" --repo "$REPO" --body \
            "🔒 Auto-merge was disabled automatically: a release is a deliberate act. Add the \`release: approved\` label and merge this PR by hand (ADR-0001)."

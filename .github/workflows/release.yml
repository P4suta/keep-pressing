name: Release

# v* タグ push で本番リリース。手動 dispatch(publish=false) は build→sign→verify のみ走る
# Dry-run(署名スモークテスト)。署名鍵が触れる面を最小化するため build / sign / publish を
# 分離し、署名 Secret は release Environment(承認ゲート)にのみ存在する。
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'タグ名 (例 v1.2.3)'
        required: true
        type: string
      publish:
        description: '実際に GitHub Release を作成する (off = Dry-run)'
        required: false
        type: boolean
        default: false

# 既定は読み取りのみ。各ジョブで必要最小限だけ昇格する。
permissions:
  contents: read

# 署名・公開の途中でキャンセルされないようにする(同一 ref のリリースは直列化)。
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # 配布物と SBOM を生成するだけ。Secret には一切触れない。
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      # harden-runner: Windows ランナーでは egress フィルタが限定的なため audit(可視化のみ)。
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup toolchain (mise)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      # タグ push なら github.ref_name、手動なら inputs.tag_name。先頭 v を除去。
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          ref="${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}"
          version="${ref#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "resolved version: $version"

      # csproj の TrimPortableDistribution が発行後に MUI/pdb/未使用 DLL を剪定 → dist/KeepPressing。
      - name: Publish portable (x64, self-contained)
        run: just publish

      # 出荷する依存の供給網を CycloneDX(JSON)で記録。後段で attestation を付ける。
      - name: Generate SBOM (CycloneDX)
        shell: bash
        run: |
          mise x -- dotnet tool install --global CycloneDX
          export PATH="$HOME/.dotnet/tools:$PATH"
          mise x -- dotnet CycloneDX KeepPressing/KeepPressing.csproj --out sbom --json
          ls -l sbom

      - name: Upload portable artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: portable
          path: dist/KeepPressing
          retention-days: 1
          if-no-files-found: error

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom/bom.json
          retention-days: 1
          if-no-files-found: error

  # first-party バイナリのみ Authenticode 署名する。署名 Secret は release Environment に隔離。
  # Secret 未設定なら警告のみで未署名のまま続行(非ブロッキング)。
  sign:
    needs: build
    runs-on: windows-latest
    environment: release
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Download portable artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: portable
          path: dist/KeepPressing

      # 署名対象は自作アセンブリのみ。Microsoft 署名済みのランタイム/WinAppSDK は再署名しない。
      # Secret の有無をここで判定し、後続の署名ステップを制御する。
      - name: Gate signing
        id: gate
        shell: bash
        env:
          ES_USERNAME: ${{ secrets.ES_USERNAME }}
        run: |
          if [ -n "$ES_USERNAME" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "署名 Secret を検出: 署名を実施します"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Unsigned release::署名 Secret(ES_USERNAME 等)未設定のため未署名で続行します"
          fi

      # esigner-codesign は 1 ファイル単位。自作 4 ファイル(ルートのランチャー + app/ の本体3つ)を順に署名する。
      # ルートの KeepPressing.exe は end-user が実行する起動ランチャーなので署名対象に含める。
      - name: Sign KeepPressing.exe (launcher, root)
        if: steps.gate.outputs.enabled == 'true'
        uses: SSLcom/esigner-codesign@cf5f6c1d38ad10f47e3ed9aca873f429b1a8d85b # v1.3.2
        with:
          command: sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          file_path: ${{ github.workspace }}\dist\KeepPressing\KeepPressing.exe
          override: true
          malware_block: false
          environment_name: PROD

      - name: Sign app/KeepPressing.exe
        if: steps.gate.outputs.enabled == 'true'
        uses: SSLcom/esigner-codesign@cf5f6c1d38ad10f47e3ed9aca873f429b1a8d85b # v1.3.2
        with:
          command: sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          file_path: ${{ github.workspace }}\dist\KeepPressing\app\KeepPressing.exe
          override: true
          malware_block: false
          environment_name: PROD

      - name: Sign app/KeepPressing.dll
        if: steps.gate.outputs.enabled == 'true'
        uses: SSLcom/esigner-codesign@cf5f6c1d38ad10f47e3ed9aca873f429b1a8d85b # v1.3.2
        with:
          command: sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          file_path: ${{ github.workspace }}\dist\KeepPressing\app\KeepPressing.dll
          override: true
          malware_block: false
          environment_name: PROD

      - name: Sign app/KeepPressing.Core.dll
        if: steps.gate.outputs.enabled == 'true'
        uses: SSLcom/esigner-codesign@cf5f6c1d38ad10f47e3ed9aca873f429b1a8d85b # v1.3.2
        with:
          command: sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          file_path: ${{ github.workspace }}\dist\KeepPressing\app\KeepPressing.Core.dll
          override: true
          malware_block: false
          environment_name: PROD

      # 署名チェーン・RFC3161 タイムスタンプ・署名者 CN を厳格検証(署名時のみ)。
      - name: Verify signatures
        if: steps.gate.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $expectedCn = 'CN=Yasunobu Sakashita'
          $files = @(
            'dist/KeepPressing/KeepPressing.exe',
            'dist/KeepPressing/app/KeepPressing.exe',
            'dist/KeepPressing/app/KeepPressing.dll',
            'dist/KeepPressing/app/KeepPressing.Core.dll'
          )
          $signtool = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe' -ErrorAction SilentlyContinue |
            Sort-Object FullName -Descending | Select-Object -First 1
          foreach ($f in $files) {
            $sig = Get-AuthenticodeSignature -FilePath $f
            if ($sig.Status -ne 'Valid') { throw "署名が無効: $f -> $($sig.Status) $($sig.StatusMessage)" }
            if ($null -eq $sig.TimeStamperCertificate) { throw "タイムスタンプ無し: $f" }
            $subject = $sig.SignerCertificate.Subject
            if ($subject -notmatch [regex]::Escape($expectedCn)) { throw "想定外の署名者: $f -> $subject" }
            Write-Host "OK  $f"
            Write-Host "    signer:    $subject"
            Write-Host "    timestamp: $($sig.TimeStamperCertificate.Subject)"
            if ($signtool) { & $signtool.FullName verify /pa /v $f; if ($LASTEXITCODE -ne 0) { throw "signtool verify 失敗: $f" } }
          }
          Write-Host "全 first-party バイナリの署名検証に成功"

      # 署名済みディレクトリを zip 化し SHA-256 を併せて生成。
      - name: Package zip + checksum
        id: pack
        shell: pwsh
        run: |
          $version = '${{ needs.build.outputs.version }}'
          $zip = "keep-pressing-$version-win-x64.zip"
          Compress-Archive -Path dist/KeepPressing -DestinationPath $zip -Force
          (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower() + "  $zip" |
            Out-File -FilePath "$zip.sha256" -Encoding ascii
          "zip=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "packaged $zip"

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package
          path: |
            ${{ steps.pack.outputs.zip }}
            ${{ steps.pack.outputs.zip }}.sha256
          retention-days: 1
          if-no-files-found: error

  # 出所証明を付けて GitHub Release を作成。Dry-run(手動 publish=false)ではスキップ。
  publish:
    needs: [build, sign]
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish }}
    runs-on: windows-latest
    permissions:
      contents: write       # Release 作成
      id-token: write        # keyless OIDC(Sigstore)
      attestations: write    # provenance / SBOM attestation
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Download package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: package
          path: out

      - name: Download SBOM artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom
          path: out

      - name: Resolve zip name
        id: pack
        shell: bash
        run: echo "zip=keep-pressing-${{ needs.build.outputs.version }}-win-x64.zip" >> "$GITHUB_OUTPUT"

      # SLSA ビルド出所証明(keyless, Secret 不要)。
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: out/${{ steps.pack.outputs.zip }}

      - name: Attest SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: out/${{ steps.pack.outputs.zip }}
          sbom-path: out/bom.json

      # 検証手順: gh attestation verify out/<zip> --repo ${{ github.repository }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          files: |
            out/${{ steps.pack.outputs.zip }}
            out/${{ steps.pack.outputs.zip }}.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true

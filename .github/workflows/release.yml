name: Release

# Production release on v* tag push. Manual dispatch (publish=false) runs build->sign->verify only
# (a signing smoke test / dry-run). build / sign / publish are split to minimize exposure of signing keys,
# which live only in the release Environment (an approval gate).
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g. v1.2.3)'
        required: true
        type: string
      publish:
        description: 'Actually create a GitHub Release (off = dry-run)'
        required: false
        type: boolean
        default: false

# Read-only by default; each job elevates only what it needs.
permissions:
  contents: read

# Don't cancel mid sign/publish (serialize releases for the same ref).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Build the distributable and SBOM only. Touches no secrets.
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      # harden-runner: audit only, since egress filtering is limited on Windows runners.
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup toolchain (mise)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      # github.ref_name on tag push, inputs.tag_name on manual; strip the leading v.
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          ref="${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}"
          version="${ref#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "resolved version: $version"

      # csproj's TrimPortableDistribution prunes MUI/pdb/unused DLLs after publish -> dist/KeepPressing.
      - name: Publish portable (x64, self-contained)
        run: just publish

      # Record the shipped dependency supply chain as CycloneDX (JSON); attested later.
      - name: Generate SBOM (CycloneDX)
        shell: bash
        run: |
          mise x -- dotnet tool install --global CycloneDX
          export PATH="$HOME/.dotnet/tools:$PATH"
          mise x -- dotnet CycloneDX KeepPressing/KeepPressing.csproj --out sbom --json
          ls -l sbom

      - name: Upload portable artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: portable
          path: dist/KeepPressing
          retention-days: 1
          if-no-files-found: error

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom/bom.json
          retention-days: 1
          if-no-files-found: error

  # Authenticode-sign first-party binaries only. Signing secrets are isolated in the release Environment;
  # if unset, warn and continue unsigned (non-blocking).
  sign:
    needs: build
    runs-on: windows-latest
    environment: release
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Download portable artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: portable
          path: dist/KeepPressing

      # Sign own assemblies only; don't re-sign Microsoft-signed runtime/WinAppSDK. Detect secret presence
      # here to gate the signing steps that follow.
      - name: Gate signing
        id: gate
        shell: bash
        env:
          ES_USERNAME: ${{ secrets.ES_USERNAME }}
        run: |
          if [ -n "$ES_USERNAME" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Signing secret detected: signing will run"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Unsigned release::Signing secret (ES_USERNAME etc.) not set; continuing unsigned"
          fi

      # esigner-codesign works one file at a time. Sign the 4 own files (root launcher + 3 in app/) in turn.
      # The root KeepPressing.exe is the launcher end users run, so it's included.
      - name: Sign KeepPressing.exe (launcher, root)
        if: steps.gate.outputs.enabled == 'true'
        uses: SSLcom/esigner-codesign@cf5f6c1d38ad10f47e3ed9aca873f429b1a8d85b # v1.3.2
        with:
          command: sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          file_path: ${{ github.workspace }}\dist\KeepPressing\KeepPressing.exe
          override: true
          malware_block: false
          environment_name: PROD

      - name: Sign app/KeepPressing.exe
        if: steps.gate.outputs.enabled == 'true'
        uses: SSLcom/esigner-codesign@cf5f6c1d38ad10f47e3ed9aca873f429b1a8d85b # v1.3.2
        with:
          command: sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          file_path: ${{ github.workspace }}\dist\KeepPressing\app\KeepPressing.exe
          override: true
          malware_block: false
          environment_name: PROD

      - name: Sign app/KeepPressing.dll
        if: steps.gate.outputs.enabled == 'true'
        uses: SSLcom/esigner-codesign@cf5f6c1d38ad10f47e3ed9aca873f429b1a8d85b # v1.3.2
        with:
          command: sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          file_path: ${{ github.workspace }}\dist\KeepPressing\app\KeepPressing.dll
          override: true
          malware_block: false
          environment_name: PROD

      - name: Sign app/KeepPressing.Core.dll
        if: steps.gate.outputs.enabled == 'true'
        uses: SSLcom/esigner-codesign@cf5f6c1d38ad10f47e3ed9aca873f429b1a8d85b # v1.3.2
        with:
          command: sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          file_path: ${{ github.workspace }}\dist\KeepPressing\app\KeepPressing.Core.dll
          override: true
          malware_block: false
          environment_name: PROD

      # Strictly verify the signature chain, RFC3161 timestamp, and signer CN (only when signing ran).
      - name: Verify signatures
        if: steps.gate.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $expectedCn = 'CN=Yasunobu Sakashita'
          $files = @(
            'dist/KeepPressing/KeepPressing.exe',
            'dist/KeepPressing/app/KeepPressing.exe',
            'dist/KeepPressing/app/KeepPressing.dll',
            'dist/KeepPressing/app/KeepPressing.Core.dll'
          )
          $signtool = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe' -ErrorAction SilentlyContinue |
            Sort-Object FullName -Descending | Select-Object -First 1
          foreach ($f in $files) {
            $sig = Get-AuthenticodeSignature -FilePath $f
            if ($sig.Status -ne 'Valid') { throw "Invalid signature: $f -> $($sig.Status) $($sig.StatusMessage)" }
            if ($null -eq $sig.TimeStamperCertificate) { throw "No timestamp: $f" }
            $subject = $sig.SignerCertificate.Subject
            if ($subject -notmatch [regex]::Escape($expectedCn)) { throw "Unexpected signer: $f -> $subject" }
            Write-Host "OK  $f"
            Write-Host "    signer:    $subject"
            Write-Host "    timestamp: $($sig.TimeStamperCertificate.Subject)"
            if ($signtool) { & $signtool.FullName verify /pa /v $f; if ($LASTEXITCODE -ne 0) { throw "signtool verify failed: $f" } }
          }
          Write-Host "All first-party binary signatures verified"

      # Zip the signed directory and emit a SHA-256 alongside.
      - name: Package zip + checksum
        id: pack
        shell: pwsh
        run: |
          $version = '${{ needs.build.outputs.version }}'
          $zip = "keep-pressing-$version-win-x64.zip"
          Compress-Archive -Path dist/KeepPressing -DestinationPath $zip -Force
          (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower() + "  $zip" |
            Out-File -FilePath "$zip.sha256" -Encoding ascii
          "zip=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "packaged $zip"

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package
          path: |
            ${{ steps.pack.outputs.zip }}
            ${{ steps.pack.outputs.zip }}.sha256
          retention-days: 1
          if-no-files-found: error

  # Create the GitHub Release with provenance attestations. Skipped on dry-run (manual publish=false).
  publish:
    needs: [build, sign]
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish }}
    runs-on: windows-latest
    permissions:
      contents: write       # Create the release
      id-token: write        # Keyless OIDC (Sigstore)
      attestations: write    # provenance / SBOM attestation
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Download package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: package
          path: out

      - name: Download SBOM artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom
          path: out

      - name: Resolve zip name
        id: pack
        shell: bash
        run: echo "zip=keep-pressing-${{ needs.build.outputs.version }}-win-x64.zip" >> "$GITHUB_OUTPUT"

      # SLSA build provenance (keyless, no secrets).
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: out/${{ steps.pack.outputs.zip }}

      - name: Attest SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: out/${{ steps.pack.outputs.zip }}
          sbom-path: out/bom.json

      # Verify with: gh attestation verify out/<zip> --repo ${{ github.repository }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          files: |
            out/${{ steps.pack.outputs.zip }}
            out/${{ steps.pack.outputs.zip }}.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true

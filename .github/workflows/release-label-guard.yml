# release-please tracks its Release PR by the `autorelease: pending` label and,
# after merge, finds the merged PR carrying it to cut the tag + GitHub Release
# (relabelling it `autorelease: tagged`). Strip that label and the release would
# silently never be cut. GitHub has no per-label lock, so instead: if anyone
# removes `autorelease: pending` from a release-please PR, put it straight back.
#
# Modelled on no-automerge-on-release-pr.yml: pull_request_target so it runs from
# main's definition with a write token, only calls the API (never checks out PR
# code), and is scoped to release-please's own branch — safe, never touches
# normal PRs. The human approval label `release: approved` is deliberately NOT
# guarded: removing it (un-approving) is a legitimate act (ADR-0001).
name: release-label-guard

on:
  pull_request_target:
    types: [unlabeled]

permissions:
  contents: read

jobs:
  reinstate:
    # `github.event.label.name` on an `unlabeled` event is the label just removed.
    # Only guard the label on an OPEN release PR: once the PR is merged/closed,
    # release-please has already cut (or finished with) the release, and a lingering
    # `autorelease: pending` makes it try to RE-release that merged PR — so removing
    # the stale label from a closed PR is correct and must NOT be reinstated.
    if: >-
      github.event.pull_request.state == 'open'
      && startsWith(github.event.pull_request.head.ref, 'release-please--')
      && github.event.label.name == 'autorelease: pending'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Reinstate release-please's tracking label
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR" --repo "$REPO" --add-label "autorelease: pending"
          gh pr comment "$PR" --repo "$REPO" --body \
            "🔒 Restored the \`autorelease: pending\` label — release-please needs it to cut the \`vX.Y.Z\` tag and Release after merge; removing it would silently skip the release (ADR-0001). To stop a release, just don't merge (or remove \`release: approved\`)."

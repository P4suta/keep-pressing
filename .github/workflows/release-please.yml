# release-please — the version/CHANGELOG/tag bot (ADR-0001).
#
# Conventional Commits land on main → this action keeps a "Release PR" open that
# bumps KeepPressing/KeepPressing.csproj's <Version> (the extra-files generic
# updater) and updates CHANGELOG.md. Merging that PR makes release-please create
# the GitHub Release as a DRAFT (config "draft": true); this workflow then
# dispatches release.yml, which builds → signs → attaches assets to the draft →
# publishes it (publishing creates the `vX.Y.Z` tag). The draft-first order is what
# makes assets land before the release becomes immutable. Humans never hand-pick or
# hand-edit a version.
#
# keep-pressing is C#-only, so this is deliberately simpler than a multi-language
# setup: one csproj updater, no lockfile to sync. The whole job is "mint App token →
# run release-please → dispatch release.yml".
#
# Runs as a GitHub App: a short-lived installation token (actions/create-github-app-token)
# from two secrets — RELEASE_PLEASE_CLIENT_ID and RELEASE_PLEASE_PRIVATE_KEY — lets
# release-please push the release commit + open the PR with a signed identity. With
# those secrets unset the job runs green and no-ops: the scaffolding ships now, the
# App lights it up later. (The release.yml dispatch uses GITHUB_TOKEN — a
# workflow_dispatch is the one event GITHUB_TOKEN may start.) See docs/RELEASING.md.

name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never cancel a release-cut in flight; only one runs per ref anyway.
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # The App private key lives in this environment's secrets. Configure the
    # environment with a deployment-branch policy of `main` only, so a workflow on
    # any other branch (or a malicious workflow edit on a feature branch) cannot
    # read the credential — repository secrets, by contrast, are readable from a
    # push to any branch. Deliberately set NO required reviewers: release-please
    # must run unattended (the human gate is merging the Release PR; signing's
    # approval gate is the separate `release` environment in release.yml). ADR-0001.
    environment: release-please
    permissions:
      contents: write # create the release commit and the draft GitHub Release
      pull-requests: write # open / maintain the Release PR
      actions: write # dispatch release.yml once the draft release is created
    env:
      # Server-side boolean — never exposes the secret values.
      HAS_APP: ${{ secrets.RELEASE_PLEASE_CLIENT_ID != '' && secrets.RELEASE_PLEASE_PRIVATE_KEY != '' }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      # Mint a short-lived installation token scoped to this repo. Its pushes (the
      # vX.Y.Z tag) DO trigger release.yml, unlike GITHUB_TOKEN's.
      - name: Mint GitHub App token
        id: app-token
        if: env.HAS_APP == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_PLEASE_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_PRIVATE_KEY }}

      - name: release-please (active)
        id: rp
        if: env.HAS_APP == 'true'
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # release-please created the GitHub Release as a DRAFT (config "draft": true).
      # Draft releases don't fire `release` events and don't create the git tag, so
      # we explicitly kick off release.yml to build → sign → attach assets to the
      # draft → publish it (publishing is what creates the tag). A GITHUB_TOKEN
      # dispatch IS allowed to start a workflow_dispatch run (the documented
      # recursion-guard exception), so this needs no App token. ADR-0001.
      - name: Trigger the signed-release build
        if: ${{ env.HAS_APP == 'true' && steps.rp.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.rp.outputs.tag_name }}
          SHA: ${{ steps.rp.outputs.sha }}
        run: |
          gh workflow run release.yml --repo "$REPO" --ref main \
            -f tag_name="$TAG" -f sha="$SHA" -f publish=true

      - name: release-please (dormant — App not configured)
        if: env.HAS_APP != 'true'
        run: |
          echo "::notice::release-please is dormant — set the RELEASE_PLEASE_CLIENT_ID and"
          echo "RELEASE_PLEASE_PRIVATE_KEY secrets (a GitHub App) to activate."
          echo "See docs/RELEASING.md and ADR-0001."

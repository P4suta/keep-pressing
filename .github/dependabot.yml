version: 2
updates:
  # NuGet dependencies (WindowsAppSDK / CommunityToolkit / CsWin32 / xunit, etc.)
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions (checkout / mise-action / action-gh-release)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
